name: Secret Scan

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .github/gitleaks.toml

  block-tracked-env:
    name: Block tracked .env files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if any .env files are tracked
        run: |
          tracked=$(git ls-files | grep -E '(^|/)\.env(\.local|\.production|\.development)?$' || true)
          if [ -n "$tracked" ]; then
            echo "::error::These environment files are tracked in git and must be removed:"
            echo "$tracked"
            echo "::error::Run: git rm --cached <file> && commit, then rotate every secret that was inside."
            exit 1
          fi
          echo "OK — no tracked .env files."
