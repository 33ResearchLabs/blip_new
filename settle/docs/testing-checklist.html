<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blip Money — Manual Testing Checklist</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --border: #222;
    --text: #e5e5e5;
    --muted: #666;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    padding: 24px; max-width: 1100px; margin: 0 auto;
    line-height: 1.5;
  }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .progress-bar {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px);
  }
  .progress-bar .track {
    flex: 1; height: 8px; background: #1a1a1a; border-radius: 4px; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; background: var(--green); border-radius: 4px;
    transition: width 0.3s ease;
  }
  .progress-bar .stats { font-size: 12px; font-family: monospace; color: var(--muted); white-space: nowrap; }
  .progress-bar .pct { font-size: 14px; font-weight: 700; min-width: 42px; }

  section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 16px; overflow: hidden;
  }
  .section-header {
    padding: 12px 16px; display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none; border-bottom: 1px solid var(--border);
  }
  .section-header:hover { background: rgba(255,255,255,0.02); }
  .section-header .icon { font-size: 16px; }
  .section-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
  .section-header .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
    font-family: monospace;
  }
  .badge-critical { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-high { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .badge-medium { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-low { background: rgba(168,85,247,0.15); color: var(--purple); }
  .section-count { font-size: 11px; color: var(--muted); font-family: monospace; }

  .items { padding: 4px 0; }
  .items.collapsed { display: none; }
  .item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 16px; transition: background 0.15s;
  }
  .item:hover { background: rgba(255,255,255,0.015); }
  .item input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 18px; height: 18px; min-width: 18px;
    border: 2px solid #333; border-radius: 4px; margin-top: 1px;
    cursor: pointer; transition: all 0.15s;
  }
  .item input[type="checkbox"]:checked {
    background: var(--green); border-color: var(--green);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: center; background-size: 14px;
  }
  .item label { cursor: pointer; font-size: 13px; flex: 1; }
  .item.checked label { color: var(--muted); text-decoration: line-through; }
  .item .tag {
    font-size: 9px; padding: 1px 6px; border-radius: 6px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; margin-top: 2px;
  }
  .tag-security { background: rgba(239,68,68,0.12); color: var(--red); }
  .tag-financial { background: rgba(245,158,11,0.12); color: var(--yellow); }
  .tag-ux { background: rgba(59,130,246,0.12); color: var(--blue); }
  .tag-edge { background: rgba(168,85,247,0.12); color: var(--purple); }
  .tag-perf { background: rgba(34,197,94,0.12); color: var(--green); }

  .note {
    font-size: 11px; color: var(--muted); padding: 0 16px 8px 44px;
    margin-top: -4px; font-style: italic;
  }

  .actions {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .actions button {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 12px; cursor: pointer;
    font-weight: 500;
  }
  .actions button:hover { background: #1a1a1a; }
  .env-info {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .env-info input, .env-info select {
    padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 12px; font-family: monospace;
  }
  @media print {
    body { background: #fff; color: #000; }
    .progress-bar, .actions, .env-info { display: none; }
    section { break-inside: avoid; border-color: #ccc; background: #fff; }
    .item input[type="checkbox"] { border-color: #999; }
    .item.checked label { color: #999; }
  }
</style>
</head>
<body>

<h1>Blip Money — Manual Testing Checklist</h1>
<p class="subtitle">Complete end-to-end QA checklist for production readiness. Check each item as you test.</p>

<div class="env-info">
  <input type="text" id="env-url" placeholder="Base URL (e.g. https://app.blip.money)" style="width:280px">
  <input type="text" id="env-tester" placeholder="Tester name">
  <input type="date" id="env-date">
</div>

<div class="actions">
  <button onclick="expandAll()">Expand All</button>
  <button onclick="collapseAll()">Collapse All</button>
  <button onclick="resetAll()">Reset All</button>
  <button onclick="window.print()">Print / PDF</button>
  <button onclick="exportResults()">Export JSON</button>
</div>

<div class="progress-bar">
  <span class="pct" id="pct">0%</span>
  <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
  <span class="stats"><span id="done">0</span> / <span id="total">0</span></span>

<div id="sections"></div>

// Render
const sectionsEl = document.getElementById('sections');
let allCheckboxes = [];

DATA.forEach((section, si) => {
  const sec = document.createElement('section');
  sec.innerHTML = `
    <div class="section-header" onclick="toggleSection(${si})">
      <span class="icon">${section.icon}</span>
      <h2>${section.title}</h2>
      <span class="badge badge-${section.priority}">${section.priority.toUpperCase()}</span>
      <span class="section-count" id="sec-count-${si}">0/${section.items.length}</span>
    </div>
    <div class="items" id="sec-items-${si}">
      ${section.items.map((item, ii) => {
        const id = `cb-${si}-${ii}`;
        const tagsHtml = item.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
        const noteHtml = item.note ? `<div class="note">${item.note}</div>` : '';
        return `
          <div class="item" id="item-${si}-${ii}">
            <input type="checkbox" id="${id}" onchange="onCheck(${si},${ii})">
            <label for="${id}">${item.text}</label>
            ${tagsHtml}
          </div>
          ${noteHtml}
        `;
      }).join('')}
    </div>
  `;
  sectionsEl.appendChild(sec);
  section.items.forEach((_, ii) => allCheckboxes.push({ si, ii }));
});

document.getElementById('total').textContent = allCheckboxes.length;
document.getElementById('env-date').value = new Date().toISOString().split('T')[0];

function onCheck(si, ii) {
  const cb = document.getElementById(`cb-${si}-${ii}`);
  const item = document.getElementById(`item-${si}-${ii}`);
  item.classList.toggle('checked', cb.checked);
  updateProgress();
  save();
}

function updateProgress() {
  let total = allCheckboxes.length, done = 0;
  DATA.forEach((sec, si) => {
    let secDone = 0;
    sec.items.forEach((_, ii) => {
      if (document.getElementById(`cb-${si}-${ii}`).checked) { done++; secDone++; }
    });
    document.getElementById(`sec-count-${si}`).textContent = `${secDone}/${sec.items.length}`;
  });
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('fill').style.width = pct + '%';
  document.getElementById('done').textContent = done;
  document.getElementById('pct').style.color = pct === 100 ? 'var(--green)' : pct >= 70 ? 'var(--yellow)' : 'var(--text)';
}

function toggleSection(si) {
  document.getElementById(`sec-items-${si}`).classList.toggle('collapsed');
}
function expandAll() { DATA.forEach((_, si) => document.getElementById(`sec-items-${si}`).classList.remove('collapsed')); }
function collapseAll() { DATA.forEach((_, si) => document.getElementById(`sec-items-${si}`).classList.add('collapsed')); }
function resetAll() {
  if (!confirm('Reset all checkboxes?')) return;
  allCheckboxes.forEach(({ si, ii }) => {
    const cb = document.getElementById(`cb-${si}-${ii}`);
    cb.checked = false;
    document.getElementById(`item-${si}-${ii}`).classList.remove('checked');
  });
  updateProgress();
  save();
}

function save() {
  const state = {};
  allCheckboxes.forEach(({ si, ii }) => {
    if (document.getElementById(`cb-${si}-${ii}`).checked) state[`${si}-${ii}`] = true;
  });
  localStorage.setItem('blip_qa_checklist', JSON.stringify({
    state,
    url: document.getElementById('env-url').value,
    tester: document.getElementById('env-tester').value,
    date: document.getElementById('env-date').value,
  }));
}

function load() {
  try {
    const raw = localStorage.getItem('blip_qa_checklist');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.state) {
      Object.keys(data.state).forEach(key => {
        const [si, ii] = key.split('-').map(Number);
        const cb = document.getElementById(`cb-${si}-${ii}`);
        if (cb) { cb.checked = true; document.getElementById(`item-${si}-${ii}`).classList.add('checked'); }
      });
    }
    if (data.url) document.getElementById('env-url').value = data.url;
    if (data.tester) document.getElementById('env-tester').value = data.tester;
    if (data.date) document.getElementById('env-date').value = data.date;
    updateProgress();
  } catch {}
}

function exportResults() {
  const results = { url: document.getElementById('env-url').value, tester: document.getElementById('env-tester').value, date: document.getElementById('env-date').value, sections: [] };
  DATA.forEach((sec, si) => {
    const items = sec.items.map((item, ii) => ({
      text: item.text,
      passed: document.getElementById(`cb-${si}-${ii}`).checked,
      tags: item.tags,
    }));
    results.sections.push({ title: sec.title, priority: sec.priority, items, passed: items.filter(i => i.passed).length, total: items.length });
  });
  const totalPassed = results.sections.reduce((s, sec) => s + sec.passed, 0);
  const totalItems = results.sections.reduce((s, sec) => s + sec.total, 0);
  results.summary = { passed: totalPassed, total: totalItems, percentage: Math.round((totalPassed / totalItems) * 100) };
  const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `blip-qa-${results.date || 'results'}.json`;
  a.click();
}

load();
</script>
</body>
