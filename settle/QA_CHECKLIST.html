<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blip Money — QA Testing Checklist</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #222;
    --border-light: #333;
    --text: #e5e5e5;
    --text-dim: #888;
    --text-muted: #555;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.08);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.08);
    --orange: #f97316;
    --orange-bg: rgba(249,115,22,0.08);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.08);
    --purple: #a855f7;
    --purple-bg: rgba(168,85,247,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 20px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .header p { color: var(--text-dim); font-size: 13px; margin-top: 6px; }

  /* Progress bar */
  .progress-bar-container {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .progress-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .progress-stats .total { color: var(--text-dim); }
  .progress-stats .pct { font-weight: 700; font-size: 14px; }
  .progress-track {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .stat-chips {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .stat-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: monospace;
    font-weight: 600;
  }
  .stat-chip.pass { background: var(--green-bg); color: var(--green); }
  .stat-chip.fail { background: var(--red-bg); color: var(--red); }
  .stat-chip.skip { background: var(--orange-bg); color: var(--orange); }

  /* Section */
  .section {
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--surface2); }
  .section.open .section-header { border-bottom-color: var(--border); }
  .section-header .left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-header .icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .section-header h2 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .section-header .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 12px;
    font-family: monospace;
    font-weight: 700;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .section-header .chevron {
    font-size: 14px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .section.open .section-header .chevron { transform: rotate(180deg); }
  .section-body { display: none; }
  .section.open .section-body { display: block; }

  /* Test row */
  .test-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    font-size: 13px;
  }
  .test-row:last-child { border-bottom: none; }
  .test-row:hover { background: rgba(255,255,255,0.015); }
  .test-row.checked { opacity: 0.5; }
  .test-row.checked .test-label { text-decoration: line-through; }
  .test-row.fail-row { background: var(--red-bg); }

  .test-row input[type="checkbox"] {
    appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border-light);
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    position: relative;
    transition: all 0.15s;
  }
  .test-row input[type="checkbox"]:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .test-row input[type="checkbox"]:checked::after {
    content: '\2713';
    position: absolute;
    top: -1px;
    left: 2px;
    font-size: 13px;
    font-weight: 900;
    color: #000;
  }

  .test-id {
    font-family: monospace;
    font-size: 10px;
    color: var(--text-muted);
    min-width: 70px;
    padding-top: 2px;
  }
  .test-label { flex: 1; color: var(--text); }
  .test-priority {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 800;
    font-family: monospace;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .test-priority.p0 { background: var(--red-bg); color: var(--red); }
  .test-priority.p1 { background: var(--orange-bg); color: var(--orange); }
  .test-priority.p2 { background: var(--blue-bg); color: var(--blue); }

  .test-status {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .test-status button {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }
  .test-status button:hover { border-color: var(--text-muted); }
  .test-status button.active-pass { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .test-status button.active-fail { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .test-status button.active-skip { background: var(--orange-bg); color: var(--orange); border-color: var(--orange); }

  /* Notes */
  .test-notes {
    width: 100%;
    margin-top: 6px;
    padding: 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 11px;
    font-family: monospace;
    resize: vertical;
    min-height: 28px;
    display: none;
  }
  .test-row.has-note .test-notes,
  .test-row.fail-row .test-notes { display: block; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 32px;
  }

  /* Actions bar */
  .actions-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .actions-bar button {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .actions-bar button:hover { background: var(--surface2); color: var(--text); }

  /* Print */
  @media print {
    .progress-bar-container, .actions-bar, .test-status button { display: none; }
    body { background: #fff; color: #000; }
    .section, .header { border-color: #ccc; background: #fff; }
    .test-row { border-color: #eee; }
  }
</style>
</head>

      { id: "SEC-004", label: "Auth header manipulation — cannot impersonate another user", p: "p0" },
      { id: "SEC-005", label: "Rate limit on login (5 attempts/min)", p: "p1" },
      { id: "SEC-006", label: "Rate limit on 2FA verify (5 attempts/15min)", p: "p1" },
      { id: "SEC-007", label: "Refresh token is httpOnly cookie (not in JS)", p: "p1" },
      { id: "SEC-008", label: "TOTP secret encrypted in database (not plaintext)", p: "p0" },
      { id: "SEC-009", label: "/api/setup/* and /api/test/* disabled in production", p: "p0" },
    ]
  },
  {
    title: "Performance (Manual Observation)",
    color: "var(--text-dim)",
    bg: "rgba(255,255,255,0.03)",
    tests: [
      { id: "PERF-001", label: "Login to dashboard load < 3 seconds", p: "p1" },
      { id: "PERF-002", label: "Order creation to appearance in list < 2 seconds", p: "p1" },
      { id: "PERF-003", label: "Chat message send to display < 500ms", p: "p1" },
      { id: "PERF-004", label: "Real-time order update via Pusher < 1 second", p: "p1" },
      { id: "PERF-005", label: "Settings page load < 2 seconds", p: "p2" },
    ]
  },
  {
    title: "Pre-Production Release",
    color: "var(--orange)",
    bg: "var(--orange-bg)",
    tests: [
      { id: "REL-001", label: "MOCK_MODE=false in production env", p: "p0" },
      { id: "REL-002", label: "Solana RPC URL points to mainnet", p: "p0" },
      { id: "REL-003", label: "ADMIN_SECRET is strong random value (not dev value)", p: "p0" },
      { id: "REL-004", label: "AUTH_TOKEN_REQUIRED=true in production", p: "p0" },
      { id: "REL-005", label: "TOTP_ENCRYPTION_KEY is set (32 bytes)", p: "p0" },
      { id: "REL-006", label: "Pusher credentials are production keys", p: "p0" },
      { id: "REL-007", label: "All DB migrations applied (001-067)", p: "p0" },
      { id: "REL-008", label: "/api/health returns 200", p: "p0" },
      { id: "REL-009", label: "HTTPS enforced", p: "p0" },
      { id: "REL-010", label: ".env.local is NOT in git", p: "p0" },
      { id: "REL-011", label: "No test/seed endpoints accessible", p: "p0" },
      { id: "REL-012", label: "Error monitoring configured", p: "p1" },
    ]
  },
];

const STORAGE_KEY = 'blip_qa_checklist_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function render() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  DATA.forEach((section, si) => {
    const div = document.createElement('div');
    div.className = 'section' + (state[`sec_${si}_open`] !== false ? ' open' : '');
    div.dataset.si = si;

    const checkedCount = section.tests.filter((t) => state[t.id]?.checked).length;
    const total = section.tests.length;

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <div class="left">
          <div class="icon" style="background:${section.bg};color:${section.color}">${checkedCount === total ? '\u2713' : checkedCount}</div>
          <h2>${section.title}</h2>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge">${checkedCount}/${total}</span>
          <span class="chevron">\u25BC</span>
        </div>
      </div>
      <div class="section-body">
        ${section.tests.map(t => {
          const ts = state[t.id] || {};
          const checked = ts.checked ? 'checked' : '';
          const rowClass = ts.status === 'fail' ? 'fail-row' : '';
          const noteClass = ts.note ? 'has-note' : '';
          return `
            <div class="test-row ${checked ? 'checked' : ''} ${rowClass} ${noteClass}" data-id="${t.id}">
              <input type="checkbox" ${checked} onchange="toggleCheck('${t.id}', this)" />
              <span class="test-id">${t.id}</span>
              <div style="flex:1">
                <span class="test-label">${t.label}</span>
                <textarea class="test-notes" placeholder="Notes / bug details..." oninput="setNote('${t.id}', this.value)">${ts.note || ''}</textarea>
              </div>
              <span class="test-priority ${t.p}">${t.p.toUpperCase()}</span>
              <div class="test-status">
                <button class="${ts.status === 'pass' ? 'active-pass' : ''}" onclick="setStatus('${t.id}','pass')">Pass</button>
                <button class="${ts.status === 'fail' ? 'active-fail' : ''}" onclick="setStatus('${t.id}','fail')">Fail</button>
                <button class="${ts.status === 'skip' ? 'active-skip' : ''}" onclick="setStatus('${t.id}','skip')">Skip</button>
              </div>
            </div>`;
        }).join('')}
      </div>`;
    container.appendChild(div);
  });

  updateProgress();
}

function toggleSection(si) {
  const key = `sec_${si}_open`;
  state[key] = state[key] === false ? true : false;
  saveState(state);
  render();
}

function toggleCheck(id, el) {
  if (!state[id]) state[id] = {};
  state[id].checked = el.checked;
  if (el.checked && !state[id].status) state[id].status = 'pass';
  saveState(state);
  render();
}

function setStatus(id, status) {
  if (!state[id]) state[id] = {};
  state[id].status = state[id].status === status ? null : status;
  if (status === 'pass' || status === 'fail') state[id].checked = true;
  saveState(state);
  render();
}

function setNote(id, note) {
  if (!state[id]) state[id] = {};
  state[id].note = note;
  saveState(state);
}

function updateProgress() {
  let total = 0, checked = 0, pass = 0, fail = 0, skip = 0;
  DATA.forEach(s => s.tests.forEach(t => {
    total++;
    const ts = state[t.id] || {};
    if (ts.checked) checked++;
    if (ts.status === 'pass') pass++;
    if (ts.status === 'fail') fail++;
    if (ts.status === 'skip') skip++;
  }));

  const pct = total ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progressText').textContent = `${checked} / ${total} checked`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressPct').style.color = pct === 100 ? 'var(--green)' : pct > 70 ? 'var(--orange)' : 'var(--text)';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('passCount').textContent = pass + ' Pass';
  document.getElementById('failCount').textContent = fail + ' Fail';
  document.getElementById('skipCount').textContent = skip + ' Skip';
}

function expandAll() { DATA.forEach((_, i) => { state[`sec_${i}_open`] = true; }); saveState(state); render(); }
function collapseAll() { DATA.forEach((_, i) => { state[`sec_${i}_open`] = false; }); saveState(state); render(); }
function showFails() {
  document.querySelectorAll('.test-row').forEach(r => {
    r.style.display = r.classList.contains('fail-row') ? '' : 'none';
  });
}
function showAll() {
  document.querySelectorAll('.test-row').forEach(r => { r.style.display = ''; });
}
function resetAll() {
  if (!confirm('Reset all checklist progress? This cannot be undone.')) return;
  state = {};
  saveState(state);
  render();
}
function exportResults() {
  let csv = 'ID,Test,Priority,Status,Notes\n';
  DATA.forEach(s => s.tests.forEach(t => {
    const ts = state[t.id] || {};
    csv += `"${t.id}","${t.label}","${t.p}","${ts.status || 'pending'}","${(ts.note || '').replace(/"/g, '""')}"\n`;
  }));
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `blip_qa_results_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

render();
</script>
</body>
</html>
