<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Blip Money Merchant PWA icon — same Blip lightning identity as the
       user app, with a small "M" badge in the corner to visually
       distinguish the two installed apps on the home screen. White
       glyphs on pure black. -->
  <rect width="512" height="512" rx="112" fill="#000000"/>
  <!-- Lightning bolt, centered, slightly shifted up-left to leave room
       for the M badge in the bottom-right. -->
  <g transform="translate(80 56) scale(13.333)">
    <polygon
      points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
      fill="#ffffff"
    />
  </g>
  <!-- "M" badge bottom-right. -->
  <g>
    <circle cx="400" cy="400" r="68" fill="#ffffff"/>
    <text
      x="400" y="425"
      text-anchor="middle"
      fill="#000000"
      font-size="88"
      font-weight="800"
      font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif"
      letter-spacing="-2"
    >M</text>
  </g>
</svg>
