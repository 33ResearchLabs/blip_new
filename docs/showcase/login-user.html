<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blip — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fafafa;
    --ink:#0a0a0a;
    --ink-2:#454545;
    --ink-3:#8a8a8a;
    --ink-4:#bdbdbd;
    --line:#ededed;
    --line-2:#d8d8d8;
    --good:#10b981;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"cv11","ss01"}
  body{
    min-height:100vh;display:flex;flex-direction:column;
    background-image:
      radial-gradient(rgba(10,10,10,0.05) 1px, transparent 1px);
    background-size:24px 24px;
    background-position:0 0;
  }
  a{color:inherit;text-decoration:none}
  .mono{font-variant-numeric:tabular-nums}

  /* top */
  .top{display:flex;justify-content:space-between;align-items:center;padding:28px 32px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;letter-spacing:-0.015em}
  .mark{width:22px;height:22px;border-radius:6px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px}
  .switch-link{font-size:13px;color:var(--ink-3)}
  .switch-link:hover{color:var(--ink)}

  /* center */
  .center{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px 96px}

  .form{width:100%;max-width:320px}

  .title{margin:0 0 6px;font-size:22px;font-weight:600;letter-spacing:-0.022em;line-height:1.2}
  .sub{color:var(--ink-3);font-size:14px;line-height:1.5;margin:0 0 28px}

  .field{display:block;margin-bottom:8px}
  .field input{
    width:100%;padding:11px 14px;
    border:1px solid var(--line-2);border-radius:8px;
    background:#fff;color:var(--ink);font-size:14px;font-family:inherit;
    transition:border-color 0.12s,box-shadow 0.12s;
  }
  .field input::placeholder{color:var(--ink-4)}
  .field input:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(10,10,10,0.05)}

  .btn-primary{
    width:100%;padding:11px 16px;
    background:var(--ink);color:#fff;
    border:none;border-radius:8px;
    font-size:14px;font-weight:500;font-family:inherit;
    cursor:pointer;margin-top:4px;
    transition:background 0.12s;
  }
  .btn-primary:hover{background:#1f1f1f}

  .or{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--ink-4);margin:14px 0;letter-spacing:0.04em}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}

  .google{
    width:100%;padding:11px;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:#fff;border:1px solid var(--line-2);border-radius:8px;
    color:var(--ink);font-size:13.5px;font-weight:500;font-family:inherit;cursor:pointer;
    transition:background 0.12s,border-color 0.12s;
  }
  .google:hover{background:#fafafa;border-color:var(--ink-3)}
  .google svg{width:15px;height:15px}

  .foot{margin-top:24px;font-size:12.5px;color:var(--ink-3);text-align:center}
  .foot a{color:var(--ink);font-weight:500;border-bottom:1px solid var(--line-2)}
  .foot a:hover{border-color:var(--ink)}

  /* micro footer */
  .micro{padding:20px 32px;font-size:11px;color:var(--ink-4);display:flex;justify-content:space-between;align-items:center;letter-spacing:0.02em}
  .micro .live{display:inline-flex;align-items:center;gap:6px}
  .micro .live::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--good);box-shadow:0 0 0 2.5px rgba(16,185,129,0.16)}
  .micro .links{display:flex;gap:18px}

  @media (max-width: 480px){
    .top{padding:18px}
    .micro{padding:16px;font-size:10.5px;gap:12px;flex-wrap:wrap}
    .micro .links{gap:14px}
  }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <span class="mark">B</span>
    Blip
  </div>
  <a class="switch-link" href="login-market.html">Sign in to a desk →</a>
</header>

<main class="center">
  <div class="form">
    <h1 class="title">Sign in to Blip</h1>
    <p class="sub">One login. We'll take you back to wherever you were last.</p>

    <form onsubmit="return false">
      <div class="field">
        <input id="email" type="email" placeholder="name@blip.money" autocomplete="email" />
      </div>
      <button class="btn-primary" type="submit">Continue with email</button>
    </form>

    <div class="or">OR</div>

    <button class="google" type="button">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 1 1-3.3-13.2l5.7-5.7A20 20 0 1 0 44 24c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8A12 12 0 0 1 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7A20 20 0 0 0 6.3 14.7z"/><path fill="#4CAF50" d="M24 44a20 20 0 0 0 13.5-5.2l-6.2-5.3A12 12 0 0 1 12.7 28l-6.6 5A20 20 0 0 0 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 0 1-4 5.5l6.2 5.3C37.2 39 44 33 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
      Continue with Google
    </button>

    <p class="foot">
      New to Blip? <a href="https://blip.money/waitlist">Join the waitlist</a>
    </p>
  </div>
</main>

<footer class="micro">
  <span class="live">Network live</span>
  <div class="links">
    <a>Privacy</a>
    <a>Terms</a>
    <a>Status</a>
  </div>
</footer>

</body>
</html>
