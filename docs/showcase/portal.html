<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blip — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF8F5;
    --panel:#ffffff;
    --ink:#1d1d1f;
    --ink-2:#3a3a3c;
    --ink-soft:#6b675f;
    --line:#ece6dc;
    --line-strong:#dcd4c5;
    --accent:#cc785c;
    --accent-2:#e9a787;
    --accent-soft:#f4e3d9;
    --good:#3fae6a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{
    min-height:100vh;
    display:flex;flex-direction:column;
    background:
      radial-gradient(50% 35% at 50% 0%, rgba(204,120,92,0.07), transparent 70%),
      var(--bg);
  }
  a{color:inherit;text-decoration:none}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:22px 32px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-size:20px;font-weight:600;letter-spacing:-0.02em}
  .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
  .brand .dot{color:var(--accent)}
  .liveDot{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-soft);letter-spacing:0.04em}
  .liveDot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 4px rgba(63,174,106,0.15)}

  .center{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}

  .card{
    width:100%;max-width:440px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:22px;
    padding:44px 40px 36px;
    box-shadow:0 30px 80px -40px rgba(60,40,30,0.14);
    text-align:left;
  }

  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:0.20em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:6px 12px;border-radius:999px;font-weight:500;margin-bottom:22px}

  h1{font-family:'Fraunces',serif;font-weight:500;font-size:36px;letter-spacing:-0.022em;margin:0 0 8px;color:var(--ink);line-height:1.05}
  h1 em{font-style:italic;color:var(--accent)}
  .sub{color:var(--ink-2);font-size:14.5px;line-height:1.55;margin:0 0 32px}

  .field{display:block;margin-bottom:12px}
  .field label{display:block;font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;font-weight:500}
  .field input{width:100%;padding:14px 16px;border:1px solid var(--line-strong);border-radius:12px;font-size:15px;font-family:inherit;background:#fdfbf7;color:var(--ink);transition:border-color 0.15s,background 0.15s}
  .field input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(204,120,92,0.10)}

  .btn-primary{
    width:100%;padding:14px 18px;
    background:var(--ink);color:#fff;
    border:none;border-radius:12px;
    font-size:14.5px;font-weight:500;font-family:inherit;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;margin-top:6px;
    transition:background 0.15s;
  }
  .btn-primary:hover{background:#000}

  .or{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--ink-soft);margin:20px 0;letter-spacing:0.14em;text-transform:uppercase}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}

  .google{
    width:100%;padding:13px;
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    background:#fff;border:1px solid var(--line-strong);border-radius:12px;
    font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;color:var(--ink);
    transition:border-color 0.15s,background 0.15s;
  }
  .google:hover{border-color:var(--ink);background:#fdfbf7}
  .google svg{width:17px;height:17px;flex-shrink:0}

  .meta{margin-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--ink-soft)}
  .meta a{color:var(--ink);font-weight:500}
  .meta a:hover{color:var(--accent)}

  .foot-card{margin-top:14px;padding:14px 16px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-soft);text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  .foot-card a{color:var(--ink);font-weight:500;border-bottom:1px solid var(--line-strong)}
  .foot-card a:hover{color:var(--accent);border-color:var(--accent)}

  .below{padding:24px 32px;display:flex;justify-content:center;gap:28px;font-size:11.5px;color:var(--ink-soft);flex-wrap:wrap}
  .below span{display:inline-flex;align-items:center;gap:8px}
  .below span::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--good)}

  @media (max-width: 480px){
    .card{padding:36px 26px 28px}
    h1{font-size:30px}
    .topbar{padding:18px 20px}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="mark">B</span> Blip<span class="dot">.</span> money</div>
  <span class="liveDot">Network live</span>
</header>

<main class="center">
  <div class="card">
    <span class="eyebrow">app.blip.money</span>
    <h1>Welcome back. <em>Sign in.</em></h1>
    <p class="sub">One login. We'll take you to wherever you were last — user app or Blip Market.</p>

    <form onsubmit="return false">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@blip.money" autocomplete="email" />
      </div>
      <button class="btn-primary" type="submit">
        Continue with email
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </form>

    <div class="or">or</div>

    <button class="google" type="button">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 1 1-3.3-13.2l5.7-5.7A20 20 0 1 0 44 24c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8A12 12 0 0 1 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7A20 20 0 0 0 6.3 14.7z"/><path fill="#4CAF50" d="M24 44a20 20 0 0 0 13.5-5.2l-6.2-5.3A12 12 0 0 1 12.7 28l-6.6 5A20 20 0 0 0 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 0 1-4 5.5l6.2 5.3C37.2 39 44 33 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
      Continue with Google
    </button>

    <div class="meta">
      <span>Use a passkey</span>
      <a href="#">Trouble signing in?</a>
    </div>

    <div class="foot-card">
      New to Blip? <a href="https://blip.money/waitlist">Join the waitlist →</a>
    </div>
  </div>
</main>

<div class="below">
  <span>Escrow-protected</span>
  <span>On-chain settlement</span>
  <span>Same login on both sides</span>
</div>

</body>
</html>
